<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">

<!-- PWA manifest (내장 data URI) -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%EB%8F%99%EC%A7%80%20PT%20%EC%BD%94%EC%B9%98%22%2C%22short_name%22%3A%22%EB%8F%99%EC%A7%80%20PT%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f6f3ec%22%2C%22theme_color%22%3A%22%232f6f5e%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2527http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2527%2520viewBox%253D%25270%25200%2520180%2520180%2527%253E%253Crect%2520width%253D%2527180%2527%2520height%253D%2527180%2527%2520rx%253D%252740%2527%2520fill%253D%2527%25232f6f5e%2527%252F%253E%253Cg%2520fill%253D%2527%2523fffdf8%2527%253E%253Crect%2520x%253D%252738%2527%2520y%253D%252778%2527%2520width%253D%252714%2527%2520height%253D%252724%2527%2520rx%253D%25274%2527%252F%253E%253Crect%2520x%253D%252752%2527%2520y%253D%252768%2527%2520width%253D%252716%2527%2520height%253D%252744%2527%2520rx%253D%25275%2527%252F%253E%253Crect%2520x%253D%252768%2527%2520y%253D%252784%2527%2520width%253D%252744%2527%2520height%253D%252712%2527%2520rx%253D%25276%2527%252F%253E%253Crect%2520x%253D%2527112%2527%2520y%253D%252768%2527%2520width%253D%252716%2527%2520height%253D%252744%2527%2520rx%253D%25275%2527%252F%253E%253Crect%2520x%253D%2527128%2527%2520y%253D%252778%2527%2520width%253D%252714%2527%2520height%253D%252724%2527%2520rx%253D%25274%2527%252F%253E%253C%252Fg%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22180x180%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%22%7D%5D%7D">

<style>
  :root{
    --ink:#14241f; --paper:#f6f3ec; --card:#fffdf8; --line:#dcd6c8;
    --pt:#2f6f5e; --self:#b8742e; --rest:#8a8577;
    --accent:#c2492f; --muted:#6b6357; --warm:#9c5a25;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{overscroll-behavior-y:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:560px;margin:0 auto;min-height:100vh;overflow-x:hidden;}

  /* ===== 상단 헤더 ===== */
  .topbar{
    position:sticky;top:0;z-index:30;background:var(--pt);color:#fff;
    padding:calc(var(--safe-top) + 12px) 16px 12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
  }
  .topbar .ttl{font-size:1.05rem;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;}
  .topbar .sub{font-size:.74rem;opacity:.9;margin-top:2px;font-weight:600;}

  /* ===== 콘텐츠 ===== */
  main{padding:14px 14px calc(86px + var(--safe-bot));}
  .view{display:none;animation:fade .25s ease;}
  .view.on{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .sect-label{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:6px 2px 12px;}

  /* ===== 데이 카드 ===== */
  .day{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .day-h{padding:15px 16px;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .day-h .dow{font-size:1.2rem;font-weight:800;}
  .day-h .part{font-size:.82rem;opacity:.93;font-weight:600;margin-top:1px;}
  .day-h .meta{font-size:.7rem;opacity:.9;text-align:right;font-weight:700;white-space:nowrap;line-height:1.4;}
  .pt .day-h{background:var(--pt);} .self .day-h{background:var(--self);} .rest .day-h{background:var(--rest);}

  /* ===== 운동 항목 (펼침) ===== */
  .ex{border-top:1px solid var(--line);}
  .ex>summary{
    list-style:none;cursor:pointer;padding:13px 16px;display:flex;align-items:center;gap:11px;
  }
  .ex>summary::-webkit-details-marker{display:none;}
  .chk{
    flex:0 0 22px;width:22px;height:22px;border:2px solid var(--line);border-radius:7px;
    display:grid;place-items:center;font-size:.8rem;color:#fff;background:#fff;transition:.15s;
  }
  .ex.done .chk{background:var(--pt);border-color:var(--pt);}
  .ex-mid{flex:1;min-width:0;}
  .ex-name{font-weight:800;font-size:.97rem;letter-spacing:-.01em;word-break:keep-all;}
  .ex-name .en{font-weight:600;color:var(--muted);font-size:.78rem;}
  .ex-sub{font-size:.74rem;color:var(--muted);margin-top:1px;word-break:keep-all;}
  .ex-sr{flex:0 1 auto;max-width:46%;text-align:right;font-variant-numeric:tabular-nums;word-break:keep-all;}
  .ex-sr b{font-weight:800;font-size:.86rem;}
  .ex-sr .rir{display:block;font-size:.66rem;font-weight:800;color:var(--warm);}
  .caret{flex:0 0 14px;color:var(--muted);font-size:.7rem;transition:.2s;}
  .ex[open] .caret{transform:rotate(90deg);}

  .ex-detail{padding:2px 16px 16px;}
  .tagline{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .tag{font-size:.64rem;font-weight:800;padding:3px 9px;border-radius:7px;letter-spacing:.02em;background:rgba(47,111,94,.1);color:var(--pt);}
  .tag.iso{background:rgba(184,116,46,.12);color:var(--self);}
  .tag.core{background:rgba(194,73,47,.1);color:var(--accent);}
  .tag.tgt{background:rgba(20,36,31,.07);color:var(--ink);}

  .block{margin-top:11px;}
  .block .bt{font-size:.68rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
  .block ul{list-style:none;display:grid;gap:5px;}
  .block li{font-size:.85rem;color:#33403a;padding-left:15px;position:relative;}
  .block li::before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--pt);}
  .block.warn li::before{background:var(--accent);}
  .block li b{color:var(--accent);font-weight:700;}
  .alt{margin-top:11px;font-size:.83rem;background:rgba(184,116,46,.08);border:1px dashed var(--line);border-radius:10px;padding:9px 12px;color:#5a4a40;}
  .alt b{color:var(--self);}

  .finisher{margin:0 16px 14px;padding:12px 14px;background:rgba(47,111,94,.05);border:1px dashed var(--line);border-radius:12px;font-size:.84rem;}
  .finisher .ft{font-weight:800;font-size:.74rem;letter-spacing:.04em;color:var(--pt);text-transform:uppercase;margin-bottom:6px;}
  .finisher li{display:flex;justify-content:space-between;gap:10px;list-style:none;padding:2px 0;color:#33403a;}
  .finisher li span:last-child{font-weight:700;color:var(--muted);white-space:nowrap;}
  .note{padding:11px 16px;background:rgba(194,73,47,.05);border-top:1px solid var(--line);font-size:.8rem;color:#5a4a40;}
  .note b{color:var(--accent);}
  .restbody{padding:16px;font-size:.88rem;color:#5a4a40;}
  .restbody b{color:var(--accent);}

  /* ===== 진행률 바 ===== */
  .progress{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:14px;}
  .progress .pl{display:flex;justify-content:space-between;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:7px;}
  .progress .pl b{color:var(--pt);}
  .bar{height:9px;border-radius:6px;background:rgba(47,111,94,.12);overflow:hidden;}
  .bar>i{display:block;height:100%;background:var(--pt);width:0;transition:width .3s;border-radius:6px;}
  .resetbtn{margin-top:9px;font-size:.72rem;color:var(--muted);background:none;border:none;text-decoration:underline;cursor:pointer;}

  /* ===== 사전 검색 ===== */
  .search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);font-size:.95rem;margin-bottom:6px;color:var(--ink);}
  .search:focus{outline:none;border-color:var(--pt);}
  .grp-h{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--self);margin:18px 2px 8px;}
  .dict-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:10px;}

  /* ===== 월간 ===== */
  .month-hero{background:linear-gradient(135deg,var(--pt),#27594b);color:#fff;border-radius:16px;padding:18px;margin-bottom:16px;}
  .month-hero .mtag{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;opacity:.85;font-weight:800;}
  .month-hero h2{font-size:1.25rem;font-weight:800;margin:4px 0 6px;}
  .month-hero p{font-size:.85rem;opacity:.95;line-height:1.55;}
  .rec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:11px;}
  .rec h4{font-size:.97rem;font-weight:800;display:flex;align-items:center;gap:7px;}
  .rec .why{font-size:.8rem;color:var(--muted);margin:4px 0 8px;}
  .rec .dose{font-size:.82rem;font-weight:700;color:var(--pt);background:rgba(47,111,94,.08);border-radius:8px;padding:6px 10px;display:inline-block;}
  .info-card{background:rgba(47,111,94,.05);border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:.83rem;color:#4d463c;margin-bottom:14px;}
  .info-card h4{color:var(--pt);font-size:.86rem;margin-bottom:6px;}
  .info-card b{color:var(--accent);}
  .info-card ol{margin:6px 0 0 18px;display:grid;gap:4px;}

  /* ===== 하단 탭 ===== */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(255,253,248,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    display:flex;padding:6px 0 calc(6px + var(--safe-bot));
    max-width:560px;margin:0 auto;
  }
  nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-size:.66rem;font-weight:700;}
  nav button .ic{font-size:1.2rem;line-height:1;}
  nav button.on{color:var(--pt);}
  nav button.on .ic{transform:scale(1.08);}

  /* ===== 식사·영양 ===== */
  .datepick{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);font-size:.95rem;margin-bottom:14px;color:var(--ink);font-weight:700;}
  .datepick:focus{outline:none;border-color:var(--pt);}
  .sumcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:14px;}
  .sumcard .big{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .sumcard .big .lab{font-size:.8rem;font-weight:700;color:var(--muted);}
  .sumcard .big .val{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums;}
  .sumcard .tgt{font-size:.74rem;color:var(--muted);font-weight:600;}
  .pills{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .pill{border:1px solid var(--line);border-radius:11px;padding:9px 11px;background:var(--paper);}
  .pill .pk{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .pill .pv{font-size:1.05rem;font-weight:800;font-variant-numeric:tabular-nums;margin-top:1px;}
  .pill .pn{font-size:.7rem;font-weight:700;margin-top:1px;}
  .pn.short{color:var(--accent);} .pn.ok{color:var(--pt);} .pn.over{color:var(--warm);}
  .balance{text-align:center;font-weight:800;font-size:.92rem;padding:9px;border-radius:11px;margin-top:10px;}
  .balance.good{background:rgba(47,111,94,.1);color:var(--pt);}
  .balance.warn{background:rgba(194,73,47,.09);color:var(--accent);}
  .balance.mild{background:rgba(184,116,46,.1);color:var(--self);}

  .meal-row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:9px;}
  .meal-row .mname{font-size:.84rem;font-weight:800;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
  .ingrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ingrid.four{grid-template-columns:1fr 1fr;}
  .infield{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .infield label{font-size:.66rem;font-weight:700;color:var(--muted);}
  .infield input{width:100%;min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:.95rem;font-variant-numeric:tabular-nums;background:var(--paper);color:var(--ink);font-weight:700;}
  .infield input:focus{outline:none;border-color:var(--pt);background:#fff;}
  .cf-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}

  .supp-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 14px 12px;margin-bottom:14px;}
  .supp-time{font-size:.7rem;font-weight:800;letter-spacing:.06em;color:var(--self);text-transform:uppercase;margin:11px 0 6px;}
  .supp{display:flex;align-items:center;gap:9px;padding:6px 0;cursor:pointer;}
  .supp .sc{width:21px;height:21px;border:2px solid var(--line);border-radius:6px;display:grid;place-items:center;color:#fff;font-size:.75rem;background:#fff;flex:0 0 auto;}
  .supp.on .sc{background:var(--pt);border-color:var(--pt);}
  .supp .sn{font-size:.86rem;font-weight:600;}
  .supp.on .sn{color:var(--pt);}

  .mini7{background:rgba(47,111,94,.05);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:14px;}
  .mini7 h4{font-size:.78rem;color:var(--pt);margin-bottom:9px;letter-spacing:.04em;}
  .mini7 .m7grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
  .mini7 .m7stat{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px;}
  .mini7 .m7stat .v{font-size:1.15rem;font-weight:800;font-variant-numeric:tabular-nums;}
  .mini7 .m7stat .l{font-size:.68rem;color:var(--muted);font-weight:700;}
  .adh{display:flex;justify-content:space-between;font-size:.76rem;padding:3px 0;color:#4d463c;}
  .adh b{font-variant-numeric:tabular-nums;}

  /* ===== 인바디 ===== */
  .chartwrap{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 12px 8px;margin-bottom:12px;}
  .metricbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .metricbtns button{flex:1;min-width:auto;font-size:.72rem;font-weight:800;padding:7px 4px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--muted);cursor:pointer;}
  .metricbtns button.on{background:var(--pt);color:#fff;border-color:var(--pt);}
  .chartwrap svg{width:100%;height:auto;display:block;}
  .goal-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 14px;margin-bottom:12px;}
  .goal-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);font-size:.84rem;}
  .goal-row:first-child{border-top:none;}
  .goal-row .gl{flex:0 0 78px;font-weight:700;color:var(--muted);font-size:.78rem;}
  .goal-row .gnow{font-weight:800;font-variant-numeric:tabular-nums;}
  .goal-row .garrow{color:var(--muted);}
  .goal-row .ggoal{font-weight:700;color:var(--pt);font-variant-numeric:tabular-nums;}
  .goal-row .gbadge{margin-left:auto;font-size:.68rem;font-weight:800;padding:3px 8px;border-radius:7px;}
  .gbadge.hit{background:rgba(47,111,94,.12);color:var(--pt);}
  .gbadge.close{background:rgba(184,116,46,.14);color:var(--self);}
  .gbadge.far{background:rgba(194,73,47,.1);color:var(--accent);}
  .ib-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:.76rem;margin-bottom:14px;}
  .ib-table th,.ib-table td{padding:8px 6px;text-align:center;font-variant-numeric:tabular-nums;border-bottom:1px solid var(--line);}
  .ib-table th{background:rgba(47,111,94,.07);font-weight:800;color:var(--pt);font-size:.68rem;}
  .ib-table td:first-child,.ib-table th:first-child{text-align:left;padding-left:10px;font-weight:700;}
  .ib-table tr:last-child td{border-bottom:none;}
  .ib-table tr:last-child td{background:rgba(47,111,94,.04);font-weight:700;}
  .upbtn{display:block;width:100%;text-align:center;background:var(--pt);color:#fff;border:none;border-radius:12px;padding:13px;font-size:.9rem;font-weight:800;cursor:pointer;margin-bottom:8px;}
  .uphint{font-size:.74rem;color:var(--muted);text-align:center;margin-bottom:14px;line-height:1.5;}

  .foot{text-align:center;font-size:.72rem;color:var(--muted);padding:18px 10px 4px;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="ttl">🏋️ 동지 PT 코치</div>
    <div class="sub" id="todayLabel">호치민 기준 · 6일 분할 RIR 2–3</div>
  </header>

  <main>
    <!-- 오늘 -->
    <section class="view on" id="view-today">
      <div class="progress" id="progBox" style="display:none">
        <div class="pl"><span>오늘 운동 완료</span><span><b id="progTxt">0/0</b></span></div>
        <div class="bar"><i id="progBar"></i></div>
        <button class="resetbtn" id="resetBtn">체크 초기화</button>
      </div>
      <div id="todayBody"></div>
    </section>

    <!-- 주간 -->
    <section class="view" id="view-week">
      <div class="sect-label">주간 6일 분할 (일 휴식)</div>
      <div id="weekBody"></div>
    </section>

    <!-- 운동 사전 -->
    <section class="view" id="view-dict">
      <div class="sect-label">운동 사전 — 탭하면 사용법·자세 펼침</div>
      <input class="search" id="searchBox" placeholder="🔍 운동 이름 검색 (예: 스쿼트, OHP, 데드)">
      <div id="dictBody"></div>
    </section>

    <!-- 식사 -->
    <section class="view" id="view-meal">
      <div class="sect-label">식사 · 영양 기록</div>
      <input type="date" id="mealDate" class="datepick">
      <div id="mealSummary"></div>
      <div class="sect-label" style="margin-top:18px">끼니별 입력 (칼로리 · 단백질)</div>
      <div id="mealInputs"></div>
      <div class="sect-label" style="margin-top:14px">탄수화물 · 지방 합계 (데일리 레포트 기준)</div>
      <div class="cf-row" id="cfRow"></div>
      <div class="sect-label">영양제 체크</div>
      <div id="suppBox"></div>
      <div id="meal7"></div>
    </section>

function exHTML(id, opts={}){
  const e=DICT[id]; if(!e) return '';
  const sets = opts.sets || e.sets;
  const extra = e.extra ? `<span class="ex-sub">+ ${e.extra}</span>`:'';
  const checkable = opts.checkable;
  const chk = checkable ? `<span class="chk">✓</span>`:'';
  const cls = checkable ? `ex checkable" data-ex="${id}` : 'ex';
  const parts = e.part.map(p=>`<span class="tag tgt">${p}</span>`).join('');
  const typeTag = `<span class="tag ${e.cls}">${e.type}</span>`;
  return `<details class="${cls}">
    <summary>${chk}
      <span class="ex-mid">
        <span class="ex-name">${esc(e.name)} <span class="en">${e.en}</span></span>
        <span class="ex-sub">${e.target}</span>
      </span>
      <span class="ex-sr"><b>${sets}</b><span class="rir">${e.rir}</span></span>
      <span class="caret">▶</span>
    </summary>
    <div class="ex-detail">
      <div class="tagline">${typeTag}${parts}</div>
      <div class="block"><div class="bt">⚙️ 세팅·사용법</div><ul>${e.setup.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
      <div class="block"><div class="bt">✅ 바른 자세</div><ul>${e.form.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="block warn"><div class="bt">⚠️ 흔한 실수</div><ul>${e.mistakes.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="block"><div class="bt">🫁 호흡</div><ul><li>${e.breath}</li></ul></div>
      <div class="alt">🔄 <b>대체</b> · ${e.alt}</div>
    </div>
  </details>`;
}

}

function refreshProgress(){
  const boxes=[...document.querySelectorAll('#todayBody .checkable')];
  if(!boxes.length){document.getElementById('progBox').style.display='none';return;}
  document.getElementById('progBox').style.display='block';
  boxes.forEach(b=>{const id=b.dataset.ex; b.classList.toggle('done',done.includes(id));});
  const n=boxes.filter(b=>done.includes(b.dataset.ex)).length;
  document.getElementById('progTxt').textContent=`${n}/${boxes.length}`;
  document.getElementById('progBar').style.width=(n/boxes.length*100)+'%';
}

  const chk=e.target.closest('.chk'); if(!chk)return;
  e.preventDefault();
  const ex=chk.closest('.checkable'); const id=ex.dataset.ex;
  if(done.includes(id)) done=done.filter(x=>x!==id); else done.push(id);
  localStorage.setItem(LSKEY,JSON.stringify(done));
  refreshProgress();
});

const SUPPS=[

function mealKey(d){return 'dongji_meal_'+d;}
function getMeal(d){return JSON.parse(localStorage.getItem(mealKey(d))||'{"m":{},"carb":"","fat":"","supps":[]}');}
function saveMeal(d,o){localStorage.setItem(mealKey(d),JSON.stringify(o));}

const mealDateEl=document.getElementById('mealDate');

let curMealDate=dateKey;

function targetsFor(dstr){
  const dow=new Date(dstr+'T12:00:00').getDay();
  const rest=ROUTINE[dow].rest;
  return {rest,cal:rest?1800:2050,burn:rest?1945:2420,protein:140,proteinMin:125,carb:rest?150:220,fat:55};
}
const num=v=>{const n=parseFloat(v);return isNaN(n)?0:n;};

function buildMealInputs(){
  const o=getMeal(curMealDate);
  document.getElementById('mealInputs').innerHTML=MEALS.map(([id,nm,em])=>{
    const v=o.m[id]||{};
    return `<div class="meal-row"><div class="mname">${em} ${nm}</div>
      <div class="ingrid"><div class="infield"><label>칼로리 (kcal)</label>
        <input inputmode="numeric" data-meal="${id}" data-f="kcal" value="${v.kcal??''}" placeholder="0"></div>
      <div class="infield"><label>단백질 (g)</label>
        <input inputmode="numeric" data-meal="${id}" data-f="p" value="${v.p??''}" placeholder="0"></div></div></div>`;
  }).join('');
  document.getElementById('cfRow').innerHTML=
    `<div class="infield"><label>탄수화물 합계 (g)</label><input inputmode="numeric" id="carbIn" value="${o.carb??''}" placeholder="0"></div>
     <div class="infield"><label>지방 합계 (g)</label><input inputmode="numeric" id="fatIn" value="${o.fat??''}" placeholder="0"></div>`;
  document.getElementById('suppBox').innerHTML=SUPP_TIMES.map(t=>{
    const list=SUPPS.filter(s=>s.time===t).map(s=>{
      const on=o.supps.includes(s.id)?'on':'';
      return `<div class="supp ${on}" data-supp="${s.id}"><span class="sc">✓</span><span class="sn">${s.name}</span></div>`;
    }).join('');
    return `<div class="supp-card"><div class="supp-time">${t}</div>${list}</div>`;
  }).join('');
  // 리스너
  document.querySelectorAll('#mealInputs input,#cfRow input').forEach(i=>i.addEventListener('input',recalcMeal));
  document.querySelectorAll('#suppBox .supp').forEach(s=>s.addEventListener('click',()=>{
    const o2=getMeal(curMealDate);const id=s.dataset.supp;
    if(o2.supps.includes(id))o2.supps=o2.supps.filter(x=>x!==id);else o2.supps.push(id);
    saveMeal(curMealDate,o2);s.classList.toggle('on');recalcMeal();
  }));
}

function recalcMeal(){
  const o=getMeal(curMealDate);o.m={};
  let kcal=0,p=0;
  MEALS.forEach(([id])=>{
    const k=num(document.querySelector(`[data-meal="${id}"][data-f="kcal"]`).value);
    const pr=num(document.querySelector(`[data-meal="${id}"][data-f="p"]`).value);
    o.m[id]={kcal:k||'',p:pr||''};kcal+=k;p+=pr;
  });
  const carb=num(document.getElementById('carbIn').value);
  const fat=num(document.getElementById('fatIn').value);
  o.carb=document.getElementById('carbIn').value;o.fat=document.getElementById('fatIn').value;
  saveMeal(curMealDate,o);
  renderMealSummary(kcal,p,carb,fat);
  renderMeal7();
}

function renderMealSummary(kcal,p,carb,fat){
  const t=targetsFor(curMealDate);
  const balance=kcal - t.burn; // 섭취 - 총소비
  const pShort=Math.max(0,t.protein-p);
  const cShort=Math.max(0,t.carb-carb);
  const fDiff=fat-t.fat;
  // 수지 평가
  let bcls='good',btxt;
  if(kcal===0){bcls='mild';btxt='아직 입력 전 — 끼니별로 기록해 보세요';}
  else if(balance>0){bcls='warn';btxt=`흑자 +${balance} kcal · 섭취 과다`;}
  else if(balance>=-550){bcls='good';btxt=`적자 ${balance} kcal · 이상적 (목표 -300~-500)`;}
  else{bcls='mild';btxt=`적자 ${balance} kcal · 과소섭취 주의 (끼니 챙기기)`;}
  const protMsg = p>=t.protein?`<span class="pn ok">목표 충족 ✅</span>`
    : p>=t.proteinMin?`<span class="pn ok">최소(125) 충족 · 이상까지 ${t.protein-p}g</span>`
    : `<span class="pn short">${pShort}g 부족 (최소 125)</span>`;
  document.getElementById('mealSummary').innerHTML=
    `<div class="sumcard">
      <div class="big"><span class="lab">섭취 칼로리</span><span class="val">${kcal}<span class="tgt"> / ${t.cal} kcal</span></span></div>
      <div class="tgt">${t.rest?'휴식일':'운동일'} · 총 소비 ${t.burn} kcal 기준</div>
      <div class="balance ${bcls}">${btxt}</div>
      <div class="pills">
        <div class="pill"><div class="pk">🥩 단백질</div><div class="pv">${p}g</div>${protMsg}</div>
        <div class="pill"><div class="pk">🍚 탄수화물</div><div class="pv">${carb}g</div>${cShort>0?`<span class="pn short">${cShort}g 부족 (목표 ${t.carb})</span>`:`<span class="pn ok">목표 ${t.carb}g 충족</span>`}</div>
        <div class="pill"><div class="pk">🥑 지방</div><div class="pv">${fat}g</div>${Math.abs(fDiff)<=10?`<span class="pn ok">적정 (목표 ${t.fat})`:fDiff>10?`<span class="pn over">${fDiff}g 초과`:`<span class="pn short">${-fDiff}g 부족`}</span></div>
        <div class="pill"><div class="pk">💧 수분</div><div class="pv">메모</div><span class="pn">하루 2L+ 목표</span></div>
      </div>
    </div>`;
}

function renderMeal7(){
  // 선택일 포함 최근 7일
  const base=new Date(curMealDate+'T12:00:00');
  let kS=0,pS=0,kN=0;const adh={};SUPPS.forEach(s=>adh[s.id]=0);
  for(let i=0;i<7;i++){
    const d=new Date(base);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const o=JSON.parse(localStorage.getItem(mealKey(ds))||'null');if(!o)continue;
    let k=0,p=0;Object.values(o.m||{}).forEach(m=>{k+=num(m.kcal);p+=num(m.p);});
    if(k>0){kS+=k;pS+=p;kN++;}
    (o.supps||[]).forEach(id=>{if(adh[id]!=null)adh[id]++;});
  }
  // 영양제: 같은 이름(시간 다름) 묶어 표시
  const grouped={};SUPPS.forEach(s=>{const key=s.name;grouped[key]=(grouped[key]||0)+adh[s.id];});
  const maxPer={};SUPPS.forEach(s=>{maxPer[s.name]=(maxPer[s.name]||0)+7;});
  const adhRows=Object.keys(grouped).map(nm=>`<div class="adh"><span>${nm}</span><b>${grouped[nm]} / ${maxPer[nm]}</b></div>`).join('');
  document.getElementById('meal7').innerHTML=
    `<div class="mini7"><h4>📊 최근 7일 요약</h4>
      <div class="m7grid">
        <div class="m7stat"><div class="v">${kN?Math.round(kS/kN):0}</div><div class="l">평균 칼로리 (기록 ${kN}일)</div></div>
        <div class="m7stat"><div class="v">${kN?Math.round(pS/kN):0}g</div><div class="l">평균 단백질</div></div>
      </div>
      <div style="font-size:.72rem;font-weight:800;color:var(--self);margin:4px 0 5px">영양제 꾸준함 (7일 중)</div>
      ${adhRows}
    </div>`;
}

/* =========================================================
   인바디 — 측정 데이터 + CSV 업로드
   ========================================================= */
const IB_SEED=[
  {date:"2026-04-27",weight:80.2,smm:32.3,fat:23.0,bmi:25.6,pbf:28.7,bmr:1605,score:66,vfl:10,tbw:42.0,smi:8.0},
  {date:"2026-05-25",weight:78.4,smm:32.4,fat:20.8,bmi:25.0,pbf:26.6,bmr:1614,score:69,vfl:9,tbw:42.3,smi:8.1},
  {date:"2026-06-12",weight:76.8,smm:31.9,fat:20.1,bmi:24.5,pbf:26.1,bmr:1595,score:68,vfl:8,tbw:41.6,smi:8.0}
];
const IB_GOAL={weight:[71,73],smm:[32.4,33.5],pbf:[18,19],fat:[13.5,14],bmi:[22.5,23.5],vfl:[5,6]};
function getIB(){
  let arr=JSON.parse(localStorage.getItem('dongji_inbody')||'null');
  if(!arr){arr=IB_SEED.slice();localStorage.setItem('dongji_inbody',JSON.stringify(arr));}
  return arr.sort((a,b)=>a.date<b.date?-1:1);
}
function saveIB(arr){localStorage.setItem('dongji_inbody',JSON.stringify(arr));}

const METRICS=[
  {k:'weight',lab:'체중',unit:'kg',dir:-1},
  {k:'pbf',lab:'체지방률',unit:'%',dir:-1},
  {k:'smm',lab:'골격근량',unit:'kg',dir:1},
  {k:'fat',lab:'체지방량',unit:'kg',dir:-1},
  {k:'vfl',lab:'내장지방',unit:'Lv',dir:-1}
];
let curMetric='weight';

function drawChart(){
  const data=getIB();const m=METRICS.find(x=>x.k===curMetric);
  const vals=data.map(d=>d[m.k]).filter(v=>v!=null);
  if(vals.length<1){document.getElementById('chartArea').innerHTML='<p style="text-align:center;color:var(--muted);padding:20px">데이터 없음</p>';return;}
  const W=320,H=150,pad={l:34,r:14,t:14,b:24};
  let mn=Math.min(...vals),mx=Math.max(...vals);
  if(m.k==='pbf'&&IB_GOAL.pbf){mn=Math.min(mn,IB_GOAL.pbf[0]);}
  if(m.k==='weight'&&IB_GOAL.weight){mn=Math.min(mn,IB_GOAL.weight[0]);}
  const range=(mx-mn)||1;mn-=range*0.15;mx+=range*0.15;
  const x=i=>pad.l+(data.length<=1?(W-pad.l-pad.r)/2:i*(W-pad.l-pad.r)/(data.length-1));
  const y=v=>pad.t+(mx-v)/(mx-mn)*(H-pad.t-pad.b);
  const pts=data.map((d,i)=>d[m.k]!=null?`${x(i)},${y(d[m.k])}`:null).filter(Boolean);
  // 목표 밴드
  let goalBand='';const g=IB_GOAL[m.k];
  if(g){const gy1=y(g[1]),gy2=y(g[0]);goalBand=`<rect x="${pad.l}" y="${Math.min(gy1,gy2)}" width="${W-pad.l-pad.r}" height="${Math.abs(gy2-gy1)||2}" fill="rgba(47,111,94,.10)"/><text x="${W-pad.r}" y="${Math.min(gy1,gy2)-3}" font-size="8" fill="#2f6f5e" text-anchor="end" font-weight="700">목표</text>`;}
  const dots=data.map((d,i)=>d[m.k]!=null?`<circle cx="${x(i)}" cy="${y(d[m.k])}" r="3.5" fill="#2f6f5e"/><text x="${x(i)}" y="${y(d[m.k])-8}" font-size="9" fill="#14241f" text-anchor="middle" font-weight="800">${d[m.k]}</text>`:'').join('');
  const labels=data.map((d,i)=>`<text x="${x(i)}" y="${H-7}" font-size="8" fill="#6b6357" text-anchor="middle">${d.date.slice(5)}</text>`).join('');
  document.getElementById('chartArea').innerHTML=
    `<svg viewBox="0 0 ${W} ${H}">${goalBand}
      <polyline points="${pts.join(' ')}" fill="none" stroke="#2f6f5e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}${labels}
      <text x="6" y="${pad.t+4}" font-size="8" fill="#6b6357">${mx.toFixed(1)}</text>
      <text x="6" y="${H-pad.b}" font-size="8" fill="#6b6357">${mn.toFixed(1)}</text>
    </svg>`;
}

function renderMetricBtns(){
  document.getElementById('metricBtns').innerHTML=METRICS.map(m=>
    `<button class="${m.k===curMetric?'on':''}" data-m="${m.k}">${m.lab}</button>`).join('');
  document.querySelectorAll('#metricBtns button').forEach(b=>b.addEventListener('click',()=>{
    curMetric=b.dataset.m;renderMetricBtns();drawChart();
  }));
}

function goalBadge(val,g,dir){
  if(val==null)return['',''];
  const [lo,hi]=g;
  if(val>=lo&&val<=hi)return['목표 도달','hit'];
  // dir -1: 낮출수록 좋음 → 목표보다 높으면 멀다
  const gap = dir===-1 ? val-hi : lo-val;
  if(gap<=0)return['목표 도달','hit'];
  const cls = gap<=(dir===-1?(hi*0.05):(lo*0.05))? 'close':'far';
  return [`${dir===-1?'+':'−'}${gap.toFixed(1)} 남음`,cls];
}

function renderGoal(){
  const data=getIB();const last=data[data.length-1];
  const rows=[
    ['체중','weight','kg'],['골격근량','smm','kg'],['체지방률','pbf','%'],
    ['체지방량','fat','kg'],['BMI','bmi',''],['내장지방','vfl','Lv']
  ].map(([lab,k,u])=>{
    const g=IB_GOAL[k];const v=last[k];const m=METRICS.find(x=>x.k===k);const dir=m?m.dir:-1;
    const [btxt,bcls]=g?goalBadge(v,g,dir):['',''];
    const goalTxt=g?`${g[0]}~${g[1]}${u}`:'—';
    return `<div class="goal-row"><span class="gl">${lab}</span>
      <span class="gnow">${v??'-'}${u}</span><span class="garrow">→</span>
      <span class="ggoal">${goalTxt}</span>
      ${btxt?`<span class="gbadge ${bcls}">${btxt}</span>`:''}</div>`;
  }).join('');
  document.getElementById('goalCard').innerHTML=
    `<div class="goal-card"><div class="goal-row" style="font-weight:800;color:var(--ink)">
       <span class="gl" style="color:var(--ink)">최근 측정</span>
       <span style="margin-left:auto;font-size:.78rem;color:var(--muted)">${last.date} · 점수 ${last.score??'-'}</span></div>
     ${rows}</div>
     <div style="font-size:.72rem;color:var(--muted);text-align:center;margin:-4px 2px 12px">현재 → 8월 중순 목표 · 다음 정식 측정 6/26</div>`;
}

function renderIBTable(){
  const data=getIB();
  const head=`<tr><th>날짜</th><th>체중</th><th>골격근</th><th>체지방률</th><th>체지방</th><th>BMI</th><th>내장</th><th>SMI</th></tr>`;
  const rows=data.map(d=>`<tr><td>${d.date.slice(5)}</td><td>${d.weight}</td><td>${d.smm}</td><td>${d.pbf}</td><td>${d.fat}</td><td>${d.bmi}</td><td>${d.vfl}</td><td>${d.smi??'-'}</td></tr>`).join('');
  document.getElementById('ibTable').innerHTML=`<table class="ib-table">${head}${rows}</table>`;
}

function parseInbodyCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith('날짜')&&!l.startsWith('Date'));
  const recs=[];
  lines.forEach(l=>{
    const c=l.split(',');if(c.length<30)return;
    const raw=c[0].replace(/[^0-9]/g,'');if(raw.length<8)return;
    const date=`${raw.slice(0,4)}-${raw.slice(4,6)}-${raw.slice(6,8)}`;
    const f=i=>{const v=parseFloat(c[i]);return isNaN(v)?null:v;};
    recs.push({date,weight:f(2),smm:f(3),fat:f(5),bmi:f(6),pbf:f(7),bmr:f(8),score:f(9),vfl:f(28),tbw:f(29),smi:f(42)});
  });
  return recs;
}

function renderInbody(){renderGoal();renderMetricBtns();drawChart();renderIBTable();}
renderInbody();

document.getElementById('ibUpBtn').addEventListener('click',()=>document.getElementById('ibFile').click());
document.getElementById('ibFile').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const recs=parseInbodyCSV(r.result);
      if(!recs.length){alert('인바디 데이터를 찾지 못했어요. 파일을 확인해 주세요.');return;}
      let arr=getIB();
      recs.forEach(rec=>{arr=arr.filter(x=>x.date!==rec.date);arr.push(rec);});
      arr.sort((a,b)=>a.date<b.date?-1:1);saveIB(arr);
      renderInbody();
      alert(`✅ ${recs.length}건 반영됐어요. 최신: ${recs[recs.length-1].date}`);
    }catch(err){alert('읽기 오류: '+err.message);}
    e.target.value='';
  };
  r.readAsText(file,'utf-8');
});
